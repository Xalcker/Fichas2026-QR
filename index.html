<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Escáner QR - Fichas</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    :root {
      --guinda: #691C32;
      --verde-oscuro: #13322B;
      --verde-medio: #235B4E;
      --dorado: #BC955C;
      --dorado-claro: #D4AF7A;
      --fondo: #F2F0EB;
      --blanco: #FFFFFF;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--fondo);
      color: var(--verde-oscuro);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0.5rem;
      font-size: 0.85rem;
    }
    h1 {
      margin: 0.4rem 0;
      font-size: 1.15rem;
      color: var(--guinda);
    }
    #scanner-container {
      width: 100%;
      max-width: 300px;
      margin-bottom: 0.5rem;
    }
    #reader {
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      border: 2px solid var(--dorado);
    }
    #controls {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    button {
      padding: 0.4rem 1rem;
      border: none;
      border-radius: 8px;
      background: var(--guinda);
      color: var(--blanco);
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: var(--verde-oscuro); }
    button:disabled { background: #9e9e9e; cursor: not-allowed; }
    #result {
      width: 100%;
      max-width: 500px;
      display: none;
    }
    .card {
      background: var(--blanco);
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      padding: 0.8rem;
      margin-bottom: 0.5rem;
      border-top: 3px solid var(--guinda);
    }
    .card h2 {
      font-size: 0.95rem;
      margin-bottom: 0.5rem;
      color: var(--guinda);
      border-bottom: 2px solid var(--dorado);
      padding-bottom: 0.3rem;
    }
</style>
</head>
<body>
  <h1>📷 Escáner de Fichas QR</h1>

  <div id="controls">
    <button id="btn-start">Iniciar Cámara</button>
    <button id="btn-stop" disabled>Detener Cámara</button>
  </div>

  <div id="scanner-container">
    <div id="reader"></div>
  </div>

  <div id="result">
    <div class="card" id="card-info"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
